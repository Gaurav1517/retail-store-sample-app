# Source: retail-store-k8s/templates/cart/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-cart
  namespace: retail-store
  labels:
    helm.sh/chart: retail-store-1.0.0
    app.kubernetes.io/name: retail-store
    app.kubernetes.io/instance: retail-store
    app.kubernetes.io/version: "1.2.2"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: cart
    app.kubernetes.io/owner: retail-store-sample
spec:
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store
      app.kubernetes.io/instance: retail-store
      app.kubernetes.io/component: cart
      app.kubernetes.io/owner: retail-store-sample
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
      labels:
        app.kubernetes.io/name: retail-store
        app.kubernetes.io/instance: retail-store
        app.kubernetes.io/component: cart
        app.kubernetes.io/owner: retail-store-sample
    spec:
      imagePullSecrets:
        - name: regcred
      serviceAccountName: retail-store-cart
      securityContext:
        fsGroup: 1000
      containers:
        - name: cart
          env:
            - name: JAVA_OPTS
              value: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
          envFrom:
            - configMapRef:
                name: retail-store-cart
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
