<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/layout :: layout (~{::body},'orders')}">
  <body>
    <div class="max-w-6xl mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-6">Order History</h1>

      <div th:if="${#lists.isEmpty(orders)}" class="text-center py-12">
        <div class="text-gray-500 text-lg">No orders found.</div>
        <p class="text-gray-400 mt-2">Your order history will appear here once you place an order.</p>
        <a href="/" class="inline-block mt-4 bg-primary-600 text-white px-6 py-2 rounded hover:bg-primary-700">
          Continue Shopping
        </a>
      </div>

      <div th:if="${!#lists.isEmpty(orders)}" class="space-y-6">
        <div th:each="order : ${orders}" class="bg-white rounded-lg shadow-md p-6">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h2 class="text-xl font-semibold text-gray-800">
                Order #<span th:text="${order.id}">ORD-12345</span>
              </h2>
              <p class="text-gray-600 mt-1">
                Placed on <span th:text="${#temporals.format(order.createdDate, 'MMM dd, yyyy')}">Jan 15, 2024</span>
              </p>
            </div>
            <div class="text-right">
              <span class="inline-block bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium">
                Completed
              </span>
            </div>
          </div>

          <div th:if="${order.items}" class="border-t pt-4">
            <h3 class="text-lg font-medium text-gray-800 mb-3">Items Ordered</h3>
            <div class="space-y-3">
              <div th:each="item : ${order.items}" class="flex items-center space-x-4">
                <img
                  src="https://via.placeholder.com/80"
                  alt="Product"
                  class="w-20 h-20 rounded object-cover"
                  th:src="${'/assets/img/products/'+item.id+'.jpg'}"
                />
                <div class="flex-1">
                  <h4 class="text-sm font-medium text-gray-800" th:text="${item.name}">Product Name</h4>
                  <p class="text-sm text-gray-600">Quantity: <span th:text="${item.quantity}">1</span></p>
                </div>
                <div class="text-right">
                  <p class="text-sm font-medium text-gray-800">$<span th:text="${item.totalCost}">29.99</span></p>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${order.shippingAddress}" class="border-t pt-4 mt-4">
            <h3 class="text-lg font-medium text-gray-800 mb-3">Shipping Address</h3>
            <div class="text-sm text-gray-600">
              <p th:text="${order.shippingAddress.firstName + ' ' + order.shippingAddress.lastName}">John Doe</p>
              <p th:text="${order.shippingAddress.address1}">123 Main St</p>
              <p th:if="${order.shippingAddress.address2}" th:text="${order.shippingAddress.address2}"></p>
              <p th:text="${order.shippingAddress.city + ', ' + order.shippingAddress.state + ' ' + order.shippingAddress.zip}">Anytown, ST 12345</p>
              <p th:text="${order.shippingAddress.email}">john@example.com</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
