      tag: "13"
    service:
      type: ClusterIP
      port: 5432
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      storageClass: ""
    nodeSelector: {}
    tolerations: []
    affinity: {}
  rabbitmq:
    create: false
    image:
      repository: public.ecr.aws/docker/library/rabbitmq
      pullPolicy: IfNotPresent
      tag: "3.8-management"
    service:
      type: ClusterIP
      amqp:
        port: 5672
      http:
        port: 15672
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      storageClass: ""
    nodeSelector: {}
    tolerations: []
    affinity: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
