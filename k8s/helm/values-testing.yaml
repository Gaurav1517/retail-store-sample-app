# ============================================
# Orders Service — Testing config
# ============================================
orders:
  replicaCount: 1
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-orders
    pullPolicy: IfNotPresent
    tag: "1.2.2"
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 128m                  # Reduced from 256m
      memory: 256Mi              # Reduced from 512Mi
  autoscaling:
    enabled: false
  app:
    persistence:
      provider: postgres
      database: "orders"
      secret:
        username: orders_user
        password: ""
    messaging:
      provider: rabbitmq
      rabbitmq:
        secret:
          username: rabbitmq
          password: ""
  postgresql:
    create: true
    image:
      repository: public.ecr.aws/docker/library/postgres
      tag: "13"
    service:
      type: ClusterIP
      port: 5432
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m                 # Reduced from 200m
        memory: 256Mi
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi                   # Reduced from 10Gi
      storageClass: ""
  rabbitmq:
    create: true
    image:
      repository: public.ecr.aws/docker/library/rabbitmq
      tag: "3.8-management"
    service:
      type: ClusterIP
      amqp:
        port: 5672
      http:
        port: 15672
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 50m                  # Reduced from 100m
        memory: 128Mi
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi                   # Reduced from 10Gi
      storageClass: ""
  podDisruptionBudget:
    enabled: false

