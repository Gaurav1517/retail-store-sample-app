# Testing values for retail-store-k8s
# Optimized for single-node kubeadm/minikube/kind clusters
# Usage: helm install retail-store ./k8s/helm -f k8s/helm/values-testing.yaml
#
# 💡 For testing on a single node (e.g., kubeadm on EC2, minikube, kind),
#    this file reduces replica counts and resource requests significantly.

# Namespace configuration
namespace:
  create: false
  name: retail-store
  quotas:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
    persistentvolumeclaims: 5
    pods: 30
    services: 15

# Ingress configuration
# ⚠️ On kubeadm/minikube/kind clusters, LoadBalancer type won't get an external IP.
#    Use NodePort instead, or install MetalLB for on-prem LoadBalancer support.
ingress:
  enabled: true
  className: "nginx"
  annotations:
    # For testing, skip SSL redirect to simplify access
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - store.amyxjack02.shop
  tls: []
  # No TLS for testing — cert-manager can be skipped

# Cert Manager — disabled for testing (no TLS needed)
certManager:
  createClusterIssuer: false
  email: gaurav.cloud000@gmail.com
  clusterIssuerName: "letsencrypt-prod"
  server: "https://acme-v02.api.letsencrypt.org/directory"
  privateKeySecretName: "letsencrypt-prod-key"

# ============================================
# UI Service — Testing config
# ============================================
ui:
  replicaCount: 1                # Single replica for testing
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-ui
    pullPolicy: IfNotPresent
    tag: "1.2.2"
  serviceAccount:
    create: true
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 128m                  # Reduced from 256m
      memory: 256Mi              # Reduced from 512Mi
  autoscaling:
    enabled: false               # Disable HPA for testing
  podDisruptionBudget:
    enabled: false               # Disable PDB for testing

# ============================================
# Catalog Service — Testing config
# ============================================
catalog:
  replicaCount: 1
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-catalog
    pullPolicy: IfNotPresent
    tag: "1.2.2"
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 128m                  # Reduced from 256m
      memory: 128Mi              # Reduced from 256Mi
  autoscaling:
    enabled: false
  app:
    persistence:
      provider: mysql
      database: "catalogdb"
      secret:
        username: catalog_user
        password: ""
  mysql:
    create: true
    image:
      repository: public.ecr.aws/docker/library/mysql
      tag: "8.0"
    service:
      type: ClusterIP
      port: 3306
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m                 # Reduced from 200m
        memory: 256Mi
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 5Gi                   # Reduced from 10Gi
      storageClass: ""            # Use cluster default storage class
  podDisruptionBudget:
    enabled: false

# ============================================
# Cart Service — Testing config
# ============================================
cart:
  replicaCount: 1
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-cart
    pullPolicy: IfNotPresent
    tag: "1.2.2"
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 128m                  # Reduced from 256m
      memory: 256Mi              # Reduced from 512Mi
  autoscaling:
    enabled: false
  app:
    persistence:
      provider: dynamodb
      dynamodb:
        tableName: Items
        createTable: true
  dynamodb:
    create: true
    image:
      repository: public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local
      tag: "1.25.1"
    service:
      type: ClusterIP
      port: 8000
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m                  # Reduced from 100m
        memory: 128Mi
  podDisruptionBudget:
    enabled: false

# ============================================
# Checkout Service — Testing config
# ============================================
checkout:
  replicaCount: 1
  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-checkout
