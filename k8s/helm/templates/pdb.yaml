---
# UI PDB
{{- if .Values.ui.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "retail-store.fullname" . }}-ui
  namespace: {{ include "retail-store.namespace" . }}
  labels:
    {{- include "retail-store.ui.labels" . | nindent 4 }}
spec:
  {{- if .Values.ui.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.ui.podDisruptionBudget.minAvailable }}
  {{- else if .Values.ui.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.ui.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "retail-store.ui.selectorLabels" . | nindent 6 }}
{{- end }}

