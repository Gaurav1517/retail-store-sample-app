{{- if .Values.certManager.createClusterIssuer -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuerName | default "letsencrypt-prod" }}
  labels:
    {{- include "retail-store.labels" . | nindent 4 }}
spec:
  acme:
    server: {{ .Values.certManager.server | default "https://acme-v02.api.letsencrypt.org/directory" }}
    email: {{ .Values.certManager.email | required "certManager.email is required when certManager.createClusterIssuer is true" }}
    privateKeySecretRef:
      name: {{ .Values.certManager.privateKeySecretName | default (printf "%s-letsencrypt-key" (include "retail-store.fullname" .)) }}
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className | default "nginx" }}
{{- end }}

