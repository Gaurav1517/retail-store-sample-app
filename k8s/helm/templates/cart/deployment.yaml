apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retail-store.fullname" . }}-cart
  namespace: {{ include "retail-store.namespace" . }}
  labels:
    {{- include "retail-store.cart.labels" . | nindent 4 }}
spec:
{{- if not .Values.cart.autoscaling.enabled }}
  replicas: {{ .Values.cart.replicaCount }}
{{- end }}
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "retail-store.cart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.cart.podAnnotations .Values.cart.metrics.enabled }}
      annotations:
        {{- if .Values.cart.podAnnotations }}
        {{- toYaml .Values.cart.podAnnotations | nindent 8 }}
        {{- end }}
        {{- if .Values.cart.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        {{- end }}
      {{- end }}
      labels:
        {{- include "retail-store.cart.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.cart.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ printf "%s-cart" (include "retail-store.fullname" .) | quote }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: cart
          env:
            - name: JAVA_OPTS
              value: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
          envFrom:
            - configMapRef:
                name: {{ include "retail-store.fullname" . }}-cart
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: "{{ .Values.cart.image.repository }}:{{ .Values.cart.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.cart.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.cart.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory
      {{- with .Values.cart.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cart.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cart.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
