{{- if .Values.cart.dynamodb.create }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retail-store.fullname" . }}-cart-dynamodb
  namespace: {{ include "retail-store.namespace" . }}
  labels:
    {{- include "retail-store.dynamodb.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "retail-store.dynamodb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "retail-store.dynamodb.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: dynamodb
          image: "{{ .Values.cart.dynamodb.image.repository }}:{{ .Values.cart.dynamodb.image.tag }}"
          imagePullPolicy: {{ .Values.cart.dynamodb.image.pullPolicy | quote }}
          ports:
            - name: dynamodb
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.cart.dynamodb.resources | nindent 12 }}
      {{- with .Values.cart.dynamodb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
