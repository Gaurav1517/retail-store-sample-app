{{- if .Values.checkout.redis.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retail-store.fullname" . }}-checkout-redis
  namespace: {{ include "retail-store.namespace" . }}
  labels:
    {{- include "retail-store.redis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.checkout.redis.service.type | quote }}
  ports:
    - port: {{ .Values.checkout.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "retail-store.redis.selectorLabels" . | nindent 4 }}
{{- end }}
